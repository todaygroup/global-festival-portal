<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa Guide | Global Festival Intelligence Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-['Inter']">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigate('home')">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Festa Guide</span>
                </div>
                <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
                    <a href="#" onclick="app.navigate('home')" class="hover:text-indigo-600 transition-colors">Home</a>
                    <a href="#" onclick="app.navigate('explore')" class="hover:text-indigo-600 transition-colors">Explore Map</a>
                    <a href="#" onclick="app.navigate('planner')" class="hover:text-indigo-600 transition-colors">My Planner</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-all shadow-sm">Sign In</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-viewport" class="min-h-screen">
        <!-- Views will be injected here by app.js -->
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-500 text-sm">© 2026 Festa Guide. High-Fidelity Intelligence Portal. <br> Based on SDS v2.0 Standard.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
